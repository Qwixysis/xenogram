<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Xenogram · Чат</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">
    <aside class="sidebar">
        <div class="user-info" onclick="window.openProfileModal?.()" style="cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar" id="userAvatar">A</div>
                <div>
                    <h3 id="userNick">Загрузка...</h3>
                    <small id="userUid"></small>
                </div>
            </div>
        </div>
        
        <div class="friends-section">
            <h4>ДРУЗЬЯ</h4>
            <ul id="friendsList"></ul>
            
            <h4>ЗАПРОСЫ</h4>
            <ul id="pendingList"></ul>
        </div>

        <div class="sidebar-footer">
            <button onclick="openFriendModal()">➕ Добавить друга</button>
            <button onclick="logout()">🚪 Выход</button>
        </div>
    </aside>

    <main class="chat-area">
        <div id="chatHeader">👥 Выберите собеседника</div>
        <div id="chatBox"></div>
        <div class="input-area" id="messageInputArea" style="display: none;">
            <input type="text" id="chatInput" placeholder="Написать сообщение...">
            <input type="file" id="mediaInput" accept="image/*,video/*" style="display: none;">
            <button class="media-btn" onclick="document.getElementById('mediaInput').click()">📎</button>
            <button onclick="sendMessage()">➤</button>
        </div>
    </main>

    <!-- Модалка добавления друга -->
    <div id="friendModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeFriendModal()">&times;</span>
            <h3>➕ Добавить друга</h3>
            <input type="text" id="friendNickInput" placeholder="Ник друга">
            <div id="friendError" class="error"></div>
            <button onclick="sendFriendRequest()">Отправить запрос</button>
        </div>
    </div>

    <!-- Модалка профиля -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProfileModal()">&times;</span>
            <h3>👤 Мой профиль</h3>
            <div style="text-align: center; margin-bottom: 20px;">
                <img id="profileAvatar" src="" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent);">
            </div>
            <p><strong>UID:</strong> <span id="profileUid"></span></p>
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
            <p><strong>Ник:</strong> <span id="profileNick"></span></p>
            <hr style="border-color: var(--border); margin: 20px 0;">
            <h4>Редактировать</h4>
            <input type="text" id="newNick" placeholder="Новый ник">
            <input type="text" id="newPhoto" placeholder="URL новой аватарки">
            <button onclick="updateProfileData()">Сохранить</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
